<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#0a0a14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>GlassMessenger</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>

<!-- ═══════════════════════════ STYLES ═══════════════════════════ -->
<style>
/* ── Reset & Root ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #6c63ff;
  --accent-glow: rgba(108,99,255,0.35);
  --accent-text: #ffffff;
  --bg-base: #080810;
  --bg-layer1: rgba(255,255,255,0.04);
  --bg-layer2: rgba(255,255,255,0.07);
  --bg-layer3: rgba(255,255,255,0.11);
  --glass-border: rgba(255,255,255,0.10);
  --glass-border-hover: rgba(255,255,255,0.22);
  --text-primary: rgba(255,255,255,0.94);
  --text-secondary: rgba(255,255,255,0.52);
  --text-muted: rgba(255,255,255,0.28);
  --radius: 35px;
  --radius-sm: 18px;
  --radius-xs: 10px;
  --blur: 25px;
  --shadow: 0 8px 40px rgba(0,0,0,0.55);
  --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  --sidebar-w: 340px;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
.light-mode {
  --bg-base: #e8eaf6;
  --bg-layer1: rgba(255,255,255,0.55);
  --bg-layer2: rgba(255,255,255,0.70);
  --bg-layer3: rgba(255,255,255,0.82);
  --glass-border: rgba(0,0,0,0.08);
  --glass-border-hover: rgba(0,0,0,0.18);
  --text-primary: rgba(0,0,0,0.88);
  --text-secondary: rgba(0,0,0,0.50);
  --text-muted: rgba(0,0,0,0.28);
}

html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg-base);
  font-family: var(--font-body);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

/* ── Animated background mesh ───────────────────────────── */
#mesh {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 20% 30%, rgba(108,99,255,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 70%, rgba(80,200,255,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 60% 10%, rgba(255,100,150,0.08) 0%, transparent 60%);
  animation: meshShift 18s ease-in-out infinite alternate;
}
@keyframes meshShift {
  0%   { filter: blur(0px); opacity: 1; }
  50%  { filter: blur(4px); opacity: 0.85; }
  100% { filter: blur(0px); opacity: 1; }
}

/* ── Glass mixin (applied via class) ────────────────────── */
.glass {
  background: var(--bg-layer2);
  backdrop-filter: blur(var(--blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
}
.glass-sm {
  background: var(--bg-layer2);
  backdrop-filter: blur(var(--blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
}

/* ── Scrollbar ───────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 99px; }

/* ─────────────────────────────────────────────────────────── */
/* AUTH SCREEN                                                  */
/* ─────────────────────────────────────────────────────────── */
#auth-screen {
  position: fixed; inset: 0; z-index: 999;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-base);
}
.auth-card {
  width: min(420px, 94vw);
  padding: 44px 40px 40px;
  text-align: center;
  animation: fadeUp 0.55s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}
.auth-logo {
  width: 72px; height: 72px; border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 22px;
  box-shadow: 0 0 40px var(--accent-glow);
  font-size: 32px;
}
.auth-card h1 {
  font-family: var(--font-head);
  font-size: 28px; font-weight: 800;
  margin-bottom: 6px;
  background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.auth-card p { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }
.auth-tabs {
  display: flex; gap: 8px; margin-bottom: 28px;
  background: var(--bg-layer1); border-radius: var(--radius-sm);
  padding: 5px;
}
.auth-tab {
  flex: 1; padding: 10px; border: none; background: transparent;
  color: var(--text-secondary); border-radius: 14px;
  cursor: pointer; font-family: var(--font-body); font-size: 14px; font-weight: 500;
  transition: var(--transition);
}
.auth-tab.active {
  background: var(--accent); color: #fff;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.auth-field { margin-bottom: 14px; text-align: left; }
.auth-field label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.04em; }
.auth-input {
  width: 100%; padding: 13px 16px;
  background: var(--bg-layer1); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-family: var(--font-body); font-size: 14px;
  transition: var(--transition); outline: none;
}
.auth-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.auth-input::placeholder { color: var(--text-muted); }
.btn-primary {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
  border: none; border-radius: var(--radius-sm);
  color: var(--accent-text); font-family: var(--font-head); font-size: 15px; font-weight: 700;
  cursor: pointer; transition: var(--transition);
  box-shadow: 0 4px 20px var(--accent-glow);
  margin-top: 8px;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px var(--accent-glow); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
.auth-error { color: #ff6b6b; font-size: 13px; margin-top: 10px; display: none; }

/* ─────────────────────────────────────────────────────────── */
/* MAIN APP LAYOUT                                              */
/* ─────────────────────────────────────────────────────────── */
#app {
  display: none; position: fixed; inset: 0; z-index: 1;
  flex-direction: row; overflow: hidden;
}
#app.show { display: flex; }

/* ── Sidebar ────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  height: 100%; display: flex; flex-direction: column;
  padding: 16px 12px 12px;
  background: var(--bg-layer1);
  backdrop-filter: blur(var(--blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
  border-right: 1px solid var(--glass-border);
  position: relative; z-index: 10;
}

/* Sidebar header */
.sidebar-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
}
.sidebar-logo {
  width: 38px; height: 38px; border-radius: 12px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; box-shadow: 0 0 18px var(--accent-glow);
}
.sidebar-title {
  font-family: var(--font-head); font-weight: 800; font-size: 18px;
  flex: 1;
  background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

/* Search bar */
.search-wrap { position: relative; margin-bottom: 12px; }
.search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 14px; pointer-events: none;
}
#chat-search {
  width: 100%; padding: 11px 14px 11px 38px;
  background: var(--bg-layer1); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-family: var(--font-body); font-size: 13.5px;
  outline: none; transition: var(--transition);
}
#chat-search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
#chat-search::placeholder { color: var(--text-muted); }

/* New chat / group button row */
.chat-actions { display: flex; gap: 8px; margin-bottom: 14px; }
.action-btn {
  flex: 1; padding: 10px 12px;
  background: var(--bg-layer1); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); color: var(--text-secondary);
  font-family: var(--font-body); font-size: 12.5px; font-weight: 500;
  cursor: pointer; transition: var(--transition);
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.action-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

/* Chat list */
#chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
.chat-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 13px; border-radius: var(--radius-sm);
  cursor: pointer; transition: var(--transition);
  border: 1px solid transparent;
  position: relative;
}
.chat-item:hover { background: var(--bg-layer2); border-color: var(--glass-border); }
.chat-item.active {
  background: var(--bg-layer3);
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent-glow);
}
.chat-avatar {
  width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head); font-size: 16px; font-weight: 700; color: #fff;
  overflow: hidden; position: relative;
}
.chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
.avatar-online {
  position: absolute; bottom: 1px; right: 1px;
  width: 11px; height: 11px; border-radius: 50%;
  background: #22c55e; border: 2px solid var(--bg-base);
}
.chat-info { flex: 1; min-width: 0; }
.chat-name {
  font-weight: 600; font-size: 14px; margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chat-preview {
  font-size: 12.5px; color: var(--text-secondary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chat-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.chat-time { font-size: 11px; color: var(--text-muted); }
.chat-badge {
  background: var(--accent); color: #fff; font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 99px; min-width: 18px; text-align: center;
  display: none;
}

/* Sidebar bottom nav */
.sidebar-nav {
  display: flex; gap: 4px; padding-top: 12px;
  border-top: 1px solid var(--glass-border); margin-top: 8px;
}
.nav-btn {
  flex: 1; padding: 10px 6px; border: none; background: transparent;
  border-radius: var(--radius-sm); color: var(--text-muted);
  cursor: pointer; font-size: 18px; transition: var(--transition);
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.nav-btn span.nav-label { font-size: 9.5px; font-family: var(--font-body); font-weight: 500; }
.nav-btn:hover, .nav-btn.active { color: var(--accent); background: var(--bg-layer2); }

/* ── Chat Panel ─────────────────────────────────────────── */
#chat-panel {
  flex: 1; display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}

/* Chat header */
#chat-header {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 20px;
  background: var(--bg-layer1);
  backdrop-filter: blur(var(--blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
  border-bottom: 1px solid var(--glass-border);
  z-index: 5;
}
.chat-header-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head); font-weight: 700; color: #fff; font-size: 15px;
  overflow: hidden; flex-shrink: 0;
}
.chat-header-avatar img { width:100%; height:100%; object-fit:cover; }
.chat-header-info { flex: 1; }
.chat-header-name { font-family: var(--font-head); font-weight: 700; font-size: 16px; }
.chat-header-status { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
.header-actions { display: flex; gap: 6px; }
.icon-btn {
  width: 38px; height: 38px; border: none; background: var(--bg-layer2);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-xs); color: var(--text-secondary);
  cursor: pointer; font-size: 16px; transition: var(--transition);
  display: flex; align-items: center; justify-content: center;
}
.icon-btn:hover { color: var(--accent); border-color: var(--accent); }

/* Pinned message banner */
#pinned-banner {
  display: none; align-items: center; gap: 10px;
  padding: 10px 20px;
  background: rgba(108,99,255,0.12);
  border-bottom: 1px solid rgba(108,99,255,0.2);
  font-size: 13px; cursor: pointer;
}
#pinned-banner .pin-icon { color: var(--accent); font-size: 14px; }
#pinned-banner .pin-text { flex: 1; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#pinned-banner .pin-label { font-weight: 600; color: var(--accent); font-size: 11px; display: block; margin-bottom: 2px; }

/* Messages area */
#messages-area {
  flex: 1; overflow-y: auto;
  padding: 20px 20px 10px;
  display: flex; flex-direction: column; gap: 6px;
  scroll-behavior: smooth;
}

/* Empty state */
#empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text-muted); text-align: center; gap: 14px;
}
#empty-state .empty-icon { font-size: 52px; opacity: 0.3; }
#empty-state p { font-size: 15px; max-width: 260px; line-height: 1.5; }

/* Date separator */
.date-sep {
  display: flex; align-items: center; gap: 10px;
  margin: 10px 0; color: var(--text-muted); font-size: 11.5px;
}
.date-sep::before, .date-sep::after {
  content: ''; flex: 1; height: 1px; background: var(--glass-border);
}

/* Message bubbles */
.msg-group { display: flex; flex-direction: column; gap: 2px; }
.msg-row {
  display: flex; align-items: flex-end; gap: 8px;
  animation: msgIn 0.25s ease both;
}
@keyframes msgIn {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
.msg-row.mine { flex-direction: row-reverse; }

.msg-sender-avatar {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; overflow: hidden;
}
.msg-sender-avatar img { width:100%; height:100%; object-fit:cover; }
.msg-row.mine .msg-sender-avatar { display: none; }

.msg-bubble {
  max-width: min(68%, 480px);
  padding: 10px 15px 7px;
  border-radius: 22px 22px 22px 6px;
  background: var(--bg-layer3);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: relative; cursor: pointer;
  transition: var(--transition);
  word-break: break-word;
}
.msg-bubble:hover { border-color: var(--glass-border-hover); }
.msg-row.mine .msg-bubble {
  border-radius: 22px 22px 6px 22px;
  background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
  border-color: transparent;
  color: var(--accent-text);
}
.msg-sender-name {
  font-size: 11px; font-weight: 600; color: var(--accent);
  margin-bottom: 4px; display: none;
}
.group-chat .msg-row:not(.mine) .msg-sender-name { display: block; }
.msg-text { font-size: 14.5px; line-height: 1.55; }
.msg-footer { display: flex; align-items: center; justify-content: flex-end; gap: 5px; margin-top: 4px; }
.msg-time { font-size: 10.5px; color: rgba(255,255,255,0.45); }
.msg-row:not(.mine) .msg-time { color: var(--text-muted); }

/* Reply quote */
.reply-quote {
  padding: 6px 10px; border-left: 3px solid var(--accent);
  background: rgba(108,99,255,0.12); border-radius: 8px 8px 0 0;
  margin-bottom: 6px; font-size: 12.5px; color: var(--text-secondary);
  cursor: pointer;
}
.reply-quote .rq-name { font-weight: 600; color: var(--accent); margin-bottom: 2px; font-size: 11px; }
.msg-row.mine .reply-quote { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.55); }
.msg-row.mine .reply-quote .rq-name { color: rgba(255,255,255,0.8); }
.msg-row.mine .reply-quote { color: rgba(255,255,255,0.75); }

/* Image message */
.msg-image {
  max-width: 100%; border-radius: 14px; display: block;
  max-height: 320px; object-fit: cover; cursor: zoom-in;
}
.msg-file {
  display: flex; align-items: center; gap: 10px; padding: 4px 0;
}
.msg-file-icon { font-size: 26px; }
.msg-file-info .file-name { font-size: 13px; font-weight: 500; }
.msg-file-info .file-dl { font-size: 11px; opacity: 0.65; margin-top: 2px; }

/* Input area */
#input-area {
  padding: 14px 16px 14px;
  background: var(--bg-layer1);
  backdrop-filter: blur(var(--blur)) saturate(180%);
  -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
  border-top: 1px solid var(--glass-border);
}

/* Reply preview bar */
#reply-preview {
  display: none; align-items: center; gap: 10px;
  padding: 8px 14px; margin-bottom: 10px;
  background: rgba(108,99,255,0.10);
  border: 1px solid rgba(108,99,255,0.22);
  border-radius: var(--radius-sm);
  font-size: 13px;
}
#reply-preview .rp-bar { width: 3px; height: 32px; background: var(--accent); border-radius: 2px; flex-shrink: 0; }
#reply-preview .rp-info { flex: 1; min-width: 0; }
#reply-preview .rp-name { font-weight: 600; color: var(--accent); font-size: 11px; margin-bottom: 2px; }
#reply-preview .rp-text { color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#reply-preview .rp-close { cursor: pointer; color: var(--text-muted); font-size: 18px; line-height: 1; transition: var(--transition); }
#reply-preview .rp-close:hover { color: #ff6b6b; }

.input-row { display: flex; align-items: flex-end; gap: 10px; }
#attach-btn {
  width: 44px; height: 44px; border: none; background: var(--bg-layer2);
  border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
  color: var(--text-secondary); cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: var(--transition);
}
#attach-btn:hover { color: var(--accent); border-color: var(--accent); }
#file-input { display: none; }

#msg-input {
  flex: 1; min-height: 44px; max-height: 140px;
  padding: 12px 16px; resize: none; overflow-y: auto;
  background: var(--bg-layer2); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-family: var(--font-body); font-size: 14.5px; line-height: 1.45;
  outline: none; transition: var(--transition);
}
#msg-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
#msg-input::placeholder { color: var(--text-muted); }

#send-btn {
  width: 44px; height: 44px; border: none;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  border-radius: var(--radius-sm); color: #fff;
  cursor: pointer; font-size: 18px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px var(--accent-glow); transition: var(--transition);
}
#send-btn:hover { transform: scale(1.07); box-shadow: 0 6px 22px var(--accent-glow); }
#send-btn:active { transform: scale(0.97); }
#send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

/* Upload progress */
#upload-progress {
  display: none; align-items: center; gap: 10px;
  padding: 8px 14px; margin-bottom: 10px;
  background: var(--bg-layer2); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); font-size: 13px; color: var(--text-secondary);
}
.progress-bar-wrap { flex: 1; height: 4px; background: var(--bg-layer1); border-radius: 2px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.3s; }

/* No chat selected state */
#no-chat {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; color: var(--text-muted); text-align: center;
}
#no-chat .nc-icon { font-size: 64px; opacity: 0.2; }
#no-chat h2 { font-family: var(--font-head); font-size: 22px; font-weight: 700; opacity: 0.35; }
#no-chat p  { font-size: 14px; opacity: 0.3; max-width: 240px; line-height: 1.5; }

/* ── Account Panel ──────────────────────────────────────── */
#account-panel {
  display: none; flex-direction: column;
  width: 100%; height: 100%; overflow-y: auto;
  padding: 30px 24px;
}
.account-hero {
  display: flex; align-items: center; gap: 20px;
  margin-bottom: 32px; padding: 24px;
  background: var(--bg-layer2); border: 1px solid var(--glass-border);
  border-radius: var(--radius);
}
.account-avatar-wrap { position: relative; cursor: pointer; }
.account-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head); font-size: 28px; font-weight: 800; color: #fff;
  overflow: hidden; border: 3px solid var(--accent);
  box-shadow: 0 0 0 6px var(--accent-glow);
}
.account-avatar img { width:100%; height:100%; object-fit:cover; }
.avatar-edit-overlay {
  position: absolute; inset: 0; border-radius: 50%;
  background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: var(--transition); color: #fff; font-size: 18px;
}
.account-avatar-wrap:hover .avatar-edit-overlay { opacity: 1; }
.account-hero-info h2 { font-family: var(--font-head); font-size: 22px; font-weight: 800; }
.account-hero-info p  { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }

.settings-section { margin-bottom: 22px; }
.settings-section h3 {
  font-family: var(--font-head); font-size: 12px; font-weight: 700;
  letter-spacing: 0.08em; color: var(--text-muted); text-transform: uppercase;
  margin-bottom: 10px; padding-left: 4px;
}
.settings-card { background: var(--bg-layer2); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.setting-row { display: flex; flex-direction: column; gap: 6px; }
.setting-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
.setting-input {
  padding: 11px 14px;
  background: var(--bg-layer1); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-family: var(--font-body); font-size: 14px; outline: none;
  transition: var(--transition); width: 100%;
}
.setting-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

/* Color picker row */
.color-row { display: flex; align-items: center; gap: 12px; }
.color-swatches { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
.swatch {
  width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: var(--transition);
}
.swatch:hover, .swatch.selected { border-color: var(--text-primary); transform: scale(1.15); }
#custom-color-input { width: 44px; height: 30px; border: none; border-radius: 8px; cursor: pointer; padding: 0; background: none; }

/* Theme toggle */
.theme-toggle {
  display: flex; align-items: center; gap: 12px; padding: 12px 14px;
  background: var(--bg-layer1); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition);
}
.theme-toggle:hover { border-color: var(--glass-border-hover); }
.toggle-switch {
  width: 44px; height: 24px; background: var(--bg-layer3);
  border-radius: 99px; position: relative; transition: var(--transition);
  flex-shrink: 0;
}
.toggle-switch.on { background: var(--accent); }
.toggle-knob {
  width: 18px; height: 18px; background: #fff; border-radius: 50%;
  position: absolute; top: 3px; left: 3px; transition: var(--transition);
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
.toggle-switch.on .toggle-knob { left: 23px; }
.toggle-label { flex: 1; font-size: 14px; }

.btn-save {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  border: none; border-radius: var(--radius-sm);
  color: var(--accent-text); font-family: var(--font-head); font-size: 14px; font-weight: 700;
  cursor: pointer; transition: var(--transition);
  box-shadow: 0 4px 16px var(--accent-glow);
}
.btn-save:hover { transform: translateY(-2px); box-shadow: 0 6px 22px var(--accent-glow); }
.btn-logout {
  width: 100%; padding: 13px;
  background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3);
  border-radius: var(--radius-sm); color: #ef4444;
  font-family: var(--font-head); font-size: 14px; font-weight: 700;
  cursor: pointer; transition: var(--transition);
}
.btn-logout:hover { background: rgba(239,68,68,0.2); }

/* ── Modals ─────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.modal-overlay.hidden { display: none; }
.modal {
  width: min(480px, 94vw); max-height: 85vh;
  display: flex; flex-direction: column;
  padding: 28px; animation: scaleIn 0.25s ease;
}
@keyframes scaleIn {
  from { opacity:0; transform:scale(0.92); }
  to   { opacity:1; transform:scale(1); }
}
.modal h2 { font-family: var(--font-head); font-size: 20px; font-weight: 800; margin-bottom: 20px; }
.modal-close {
  position: absolute; top: 16px; right: 16px;
  width: 32px; height: 32px; border: none;
  background: var(--bg-layer2); border-radius: 50%;
  color: var(--text-secondary); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.modal-close:hover { color: var(--text-primary); }
.modal { position: relative; }

/* User search in modals */
.modal-search {
  width: 100%; padding: 11px 14px;
  background: var(--bg-layer1); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-family: var(--font-body); font-size: 14px; outline: none;
  transition: var(--transition); margin-bottom: 14px;
}
.modal-search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.user-results { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; }
.user-result-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 12px;
  border-radius: var(--radius-sm); cursor: pointer;
  border: 1px solid transparent; transition: var(--transition);
}
.user-result-item:hover { background: var(--bg-layer2); border-color: var(--glass-border); }
.user-result-item.selected { border-color: var(--accent); background: rgba(108,99,255,0.12); }
.result-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head); font-size: 14px; font-weight: 700; color: #fff;
  overflow: hidden; flex-shrink: 0;
}
.result-avatar img { width:100%; height:100%; object-fit:cover; }
.result-info .result-name { font-weight: 600; font-size: 14px; }
.result-info .result-username { font-size: 12px; color: var(--text-secondary); }

/* Group name field */
.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
.modal-field input {
  width: 100%; padding: 11px 14px;
  background: var(--bg-layer1); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-family: var(--font-body); font-size: 14px; outline: none; transition: var(--transition);
}
.modal-field input:focus { border-color: var(--accent); }

/* Selected user chips */
.selected-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.chip {
  display: flex; align-items: center; gap: 6px; padding: 4px 10px 4px 6px;
  background: var(--accent-glow); border: 1px solid rgba(108,99,255,0.3);
  border-radius: 99px; font-size: 12px; color: var(--accent);
}
.chip .chip-avatar {
  width: 20px; height: 20px; border-radius: 50%; background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: #fff; overflow: hidden;
}
.chip .chip-remove { cursor: pointer; opacity: 0.6; font-size: 13px; }
.chip .chip-remove:hover { opacity: 1; }

/* Image viewer overlay */
#img-viewer {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
  display: none; align-items: center; justify-content: center;
}
#img-viewer.show { display: flex; }
#img-viewer img { max-width: 90vw; max-height: 90vh; border-radius: 18px; }
#img-viewer-close {
  position: absolute; top: 20px; right: 20px;
  width: 44px; height: 44px; border: none; background: rgba(255,255,255,0.1);
  border-radius: 50%; color: #fff; cursor: pointer; font-size: 22px;
  display: flex; align-items: center; justify-content: center;
}

/* Toast */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--bg-layer3); border: 1px solid var(--glass-border);
  backdrop-filter: blur(var(--blur));
  padding: 12px 22px; border-radius: 99px;
  font-size: 13.5px; font-weight: 500; color: var(--text-primary);
  z-index: 900; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow: var(--shadow); pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* Typing indicator */
.typing-indicator { display: flex; gap: 4px; align-items: center; padding: 6px 0; }
.typing-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted);
  animation: typingBounce 1.4s infinite ease-in-out;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%,60%,100% { transform: translateY(0); }
  30%          { transform: translateY(-6px); }
}

/* ── Responsive ─────────────────────────────────────────── */
@media (max-width: 700px) {
  :root { --sidebar-w: 100vw; }
  #sidebar { width: 100vw; min-width: 100vw; }
  #chat-panel { display: none; position: fixed; inset: 0; z-index: 50; background: var(--bg-base); }
  #chat-panel.mobile-open { display: flex; }
  .mobile-back { display: flex !important; }
}
.mobile-back {
  display: none; width: 36px; height: 36px; border: none; background: transparent;
  color: var(--text-secondary); cursor: pointer; font-size: 20px;
  align-items: center; justify-content: center; border-radius: 10px;
}
.mobile-back:hover { background: var(--bg-layer2); color: var(--text-primary); }

/* Spinner */
.spinner {
  width: 20px; height: 20px; border: 2px solid var(--glass-border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Чтобы картинки из Telegram не вылезали за границы чата */
.chat-img {
  max-width: 100%;
  max-height: 300px;
  display: block;
  margin-top: 5px;
  border-radius: 8px;
  object-fit: contain;
}
</style>
</head>
<body>

<!-- Background mesh -->
<div id="mesh"></div>

<!-- ═══════════════════════ AUTH SCREEN ═══════════════════════ -->
<div id="auth-screen">
  <div class="auth-card glass">
    <div class="auth-logo">💬</div>
    <h1>GlassMessenger</h1>
    <p>Liquid-glass messaging, beautifully crafted.</p>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</button>
    </div>
    <!-- Login form -->
    <div id="login-form">
      <div class="auth-field">
        <label>Username</label>
        <input class="auth-input" id="login-username" type="text" placeholder="@yourname" autocomplete="username"/>
      </div>
      <div class="auth-field">
        <label>Session Token</label>
        <input class="auth-input" id="login-token" type="password" placeholder="Paste your session token"/>
      </div>
    </div>
    <!-- Signup form -->
    <div id="signup-form" style="display:none">
      <div class="auth-field">
        <label>Username</label>
        <input class="auth-input" id="su-username" type="text" placeholder="@yourname"/>
      </div>
      <div class="auth-field">
        <label>Display Name</label>
        <input class="auth-input" id="su-name" type="text" placeholder="Your Name"/>
      </div>
      <div class="auth-field">
        <label>Theme Color</label>
        <input class="auth-input" id="su-color" type="color" value="#6c63ff" style="height:44px;padding:6px 12px;cursor:pointer;"/>
      </div>
    </div>
    <div class="auth-error" id="auth-error"></div>
    <button class="btn-primary" id="auth-btn" onclick="handleAuth()">Sign In</button>
  </div>
</div>

<!-- ═══════════════════════ MAIN APP ══════════════════════════ -->
<div id="app">

  <!-- ── SIDEBAR ─────────────────────────────────────────────── -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">💬</div>
      <div class="sidebar-title">GlassMsg</div>
    </div>

    <!-- Integrated search -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="chat-search" placeholder="Search chats…" oninput="filterChats(this.value)"/>
    </div>

    <!-- Action buttons -->
    <div class="chat-actions">
      <button class="action-btn" onclick="openNewChatModal()">➕ New Chat</button>
      <button class="action-btn" onclick="openGroupModal()">👥 Group</button>
    </div>

    <!-- Chat list -->
    <div id="chat-list">
      <div style="display:flex;justify-content:center;padding:30px 0;">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Bottom nav -->
    <div class="sidebar-nav">
      <button class="nav-btn active" id="nav-chats" onclick="showPanel('chats')">
        💬<span class="nav-label">Chats</span>
      </button>
      <button class="nav-btn" id="nav-account" onclick="showPanel('account')">
        👤<span class="nav-label">Me</span>
      </button>
    </div>
  </div>

  <!-- ── CHAT / RIGHT PANEL ──────────────────────────────────── -->
  <div id="chat-panel">

    <!-- No chat selected -->
    <div id="no-chat">
      <div class="nc-icon">💬</div>
      <h2>GlassMessenger</h2>

          <div class="chat-header-name" id="hdr-name">—</div>

          <button class="icon-btn" onclick="pinCurrentMessage()" title="Pin message">📌</button>

      </div>

      <!-- Pinned message -->
      <div id="pinned-banner" onclick="scrollToPinned()">
        <span class="pin-icon">📌</span>
        <div class="pin-text">
          <span class="pin-label">Pinned Message</span>
          <span id="pinned-text">—</span>

      <!-- Messages -->
      <div id="messages-area"></div>

      <!-- Input area -->
      <div id="input-area">
        <div id="upload-progress" style="display: none;">
          <span>📎 Uploading…</span>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-fill"></div></div>
        </div>
        
        <div id="reply-preview">
          <div class="rp-bar"></div>
          <div class="rp-info">
            <div class="rp-name" id="rp-name">—</div>

          </div>
          <span class="rp-close" onclick="clearReply()">✕</span>

        <div class="input-row">

          <button id="attach-btn" class="icon-btn" onclick="document.getElementById('file-input').click()" title="Attach file">

          <textarea id="msg-input" placeholder="Message…" rows="1" onkeydown="msgKeydown(event)" oninput="autoResize(this)"></textarea>

          <button id="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>

    </div>

    <!-- Account panel (shown via nav) -->
    <div id="account-panel">
      <div class="account-hero glass">
        <div class="account-avatar-wrap" onclick="document.getElementById('avatar-file').click()">
          <div class="account-avatar" id="acc-avatar"></div>
          <div class="avatar-edit-overlay">📷</div>
        </div>
        <input type="file" id="avatar-file" accept="image/*" style="display:none" onchange="uploadAvatar(this)"/>
        <div class="account-hero-info">
          <h2 id="acc-display-name">—</h2>
          <p id="acc-username">—</p>
        </div>
      </div>

      <div class="settings-section">
        <h3>Profile</h3>
        <div class="settings-card glass">
          <div class="setting-row">
            <label class="setting-label">Display Name</label>
            <input class="setting-input" id="set-name" type="text" placeholder="Your name"/>
          </div>
        </div>

      <div class="settings-section">
        <h3>Appearance</h3>
        <div class="settings-card glass">
          <div class="setting-row">
            <label class="setting-label">Accent Color</label>

          </div>

            <label class="setting-label">Theme</label>
            <div class="theme-toggle" onclick="toggleTheme()">
              <span class="toggle-label" id="theme-label">Dark Mode</span>
              <div class="toggle-switch" id="theme-sw">
                <div class="toggle-knob"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="settings-section">
        <h3>Actions</h3>
        <div class="settings-card glass" style="gap:10px;">
          <button class="btn-save" onclick="saveSettings()">💾 Save Changes</button>
          <button class="btn-logout" onclick="logout()">🚪 Sign Out</button>
        </div>
      </div>
    </div>

  </div><!-- /#chat-panel -->
</div><!-- /#app -->

<!-- ═══════════════════════ MODALS ════════════════════════════ -->

<!-- New Chat Modal -->
<div class="modal-overlay hidden" id="new-chat-modal">
  <div class="modal glass">
    <h2>New Conversation</h2>
    <button class="modal-close" onclick="closeModal('new-chat-modal')">✕</button>
    <input class="modal-search" id="nc-search" type="text" placeholder="Search users by @username or name…" oninput="searchUsers(this.value, 'nc-results', false)"/>
    <div class="user-results" id="nc-results"></div>
  </div>
</div>

<!-- Group Create Modal -->
<div class="modal-overlay hidden" id="group-modal">

    <h2>Create Group</h2>
    <button class="modal-close" onclick="closeModal('group-modal')">✕</button>
    <div class="modal-field">
      <label>Group Name</label>

</div>

<!-- Image viewer -->
<div id="img-viewer" onclick="closeImgViewer()">
  <img id="img-viewer-img" src="" alt=""/>
  <button id="img-viewer-close" onclick="closeImgViewer()">✕</button>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>

// ── CONFIG ────────────────────────────────────────────────────

const API_URL    = "https://script.google.com/macros/s/AKfycbzBX7aMnFQvEnMRJhJEwwMcV81kvg_f2Q9IOo0P8Y6qW2ibrWXT4o8Z0tA_67oRm7Q/exec";
// Replace with your bridge server URL (e.g. https://yourserver.com or http://localhost:8000):
const BRIDGE_URL = "https://geonid-glass-bridge.hf.space";

const POLL_INTERVAL = 3000;
const BRIDGE_ENABLED = true; // Set to true when bridge is running

// ── PRESET ACCENT COLORS ──────────────────────────────────────
const ACCENT_PRESETS = [
  "#6c63ff","#3b82f6","#10b981","#f59e0b",
  "#ef4444","#ec4899","#8b5cf6","#06b6d4"
];

// ── STATE ─────────────────────────────────────────────────────
let currentUser    = null;
let chats          = [];
let activeChatId   = null;
let activeMessages = [];
let replyState     = null;   // { msg_id, sender, content }
let pollTimer      = null;
let lastMsgTs      = null;
let groupSelected  = [];     // usernames for group creation
let isLightMode    = false;
let pingTimer      = null;
let selectedPinId  = null;

// ── UTILITIES ─────────────────────────────────────────────────
function qs(sel, ctx) { return (ctx || document).querySelector(sel); }

function showToast(msg, dur) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), dur || 3000);
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso), now = new Date();
  const today = now.toDateString(), yesterday = new Date(now - 864e5).toDateString();
  if (d.toDateString() === today) return 'Today';
  if (d.toDateString() === yesterday) return 'Yesterday';
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function formatChatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso), now = new Date();
  if (d.toDateString() === now.toDateString()) return formatTime(iso);
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function isOnline(isoTs) {
  if (!isoTs) return false;
  return Date.now() - new Date(isoTs).getTime() < 90000; // 90s
}

function getInitials(name) {
  if (!name) return '?';
  return name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
}

/** Contrast checker: returns '#000' or '#fff' based on hex bg */
function contrastColor(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const luminance = (0.299*r + 0.587*g + 0.114*b) / 255;
  return luminance > 0.55 ? '#000000' : '#ffffff';
}

function applyAccent(hex, persist) {
  document.documentElement.style.setProperty('--accent', hex);
  document.documentElement.style.setProperty('--accent-glow', hex + '55');
  document.documentElement.style.setProperty('--accent-text', contrastColor(hex));
  // Highlight matching swatch
  document.querySelectorAll('.swatch').forEach(s => {
    s.classList.toggle('selected', s.dataset.color === hex);
  });
  document.getElementById('custom-color-input').value = hex;
  if (persist && currentUser) currentUser.accent_color = hex;
}

// ── AUTH ──────────────────────────────────────────────────────
let authMode = 'login';

function switchAuthTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && mode==='login') || (i===1 && mode==='signup'));
  });
  qs('#login-form').style.display  = mode === 'login'  ? '' : 'none';
  qs('#signup-form').style.display = mode === 'signup' ? '' : 'none';
  qs('#auth-btn').textContent = mode === 'login' ? 'Sign In' : 'Create Account';
  qs('#auth-error').style.display = 'none';
}

async function handleAuth() {
  const btn = qs('#auth-btn');
  btn.disabled = true;
  btn.textContent = '…';
  qs('#auth-error').style.display = 'none';

  try {
    if (authMode === 'login') {
      const username = qs('#login-username').value.trim();
      const token    = qs('#login-token').value.trim();
      if (!username || !token) throw new Error('Please fill all fields');
      await loginUser(username, token);
    } else {
      const username = qs('#su-username').value.trim();
      const name     = qs('#su-name').value.trim();
      const color    = qs('#su-color').value;
      if (!username || !name) throw new Error('Please fill all fields');
      if (!username.startsWith('@')) throw new Error('Username must start with @');
      await signupUser(username, name, color);
    }
  } catch (e) {
    const errEl = qs('#auth-error');
    errEl.textContent = e.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'Sign In' : 'Create Account';
  }
}

async function apiPost(body) {
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return r.json();
}

async function apiGet(params) {
  const url = new URL(API_URL);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const r = await fetch(url.toString());
  return r.json();
}

async function signupUser(username, display_name, accent_color) {
  const res = await apiPost({ action: 'signup', username, display_name, accent_color, bg_type: 'dark' });
  if (!res.ok) throw new Error(res.error || 'Signup failed');
  localStorage.setItem('gm_username', username);
  localStorage.setItem('gm_token', res.user_token);
  showToast('✅ Account created! Save your token: ' + res.user_token, 8000);
  await loginUser(username, res.user_token);
}

async function loginUser(username, token) {
  const res = await apiPost({ action: 'login', username, user_token: token });
  if (!res.ok) throw new Error(res.error || 'Login failed');
  currentUser = res.user;
  localStorage.setItem('gm_username', username);
  localStorage.setItem('gm_token', token);
  initApp();
}

async function tryAutoLogin() {
  const username = localStorage.getItem('gm_username');
  const token    = localStorage.getItem('gm_token');
  if (!username || !token) return false;
  try {
    const res = await apiGet({ action: 'getUserByToken', username, token });
    if (!res.ok) return false;
    currentUser = res.user;
    return true;
  } catch (_) { return false; }
}

function logout() {
  localStorage.removeItem('gm_username');
  localStorage.removeItem('gm_token');
  clearInterval(pollTimer);
  clearInterval(pingTimer);
  currentUser = null; activeChatId = null; chats = [];
  document.getElementById('app').classList.remove('show');
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  switchAuthTab('login');
}

// ── APP INIT ──────────────────────────────────────────────────
async function initApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('show');

  applyAccent(currentUser.accent_color || '#6c63ff', false);
  if (currentUser.bg_type === 'light') enableLightMode(false);

  renderAccountPanel();
  buildSwatches();
  await loadChats();

  clearInterval(pollTimer);
  clearInterval(pingTimer);

  // Poll for new messages every 3s
  pollTimer = setInterval(pollMessages, POLL_INTERVAL);

  pingTimer = setInterval(ping, 30000);
}

function buildSwatches() {

  wrap.innerHTML = '';
  ACCENT_PRESETS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'swatch'; s.dataset.color = c;
    s.style.background = c;
    s.title = c;
    s.onclick = () => applyAccent(c, true);
    wrap.appendChild(s);

}

function renderAccountPanel() {

// ── CHAT LOADING ──────────────────────────────────────────────
async function loadChats() {
  const res = await apiGet({
    action: 'listChats',
    username: currentUser.username,
    token: currentUser.user_token
  });
  if (!res.ok) { showToast('Failed to load chats'); return; }
  chats = res.chats || [];
  renderChatList(chats);
}

function renderChatList(list) {
  const el = document.getElementById('chat-list');
  if (!list.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px;">No chats yet.<br/>Start a new conversation!</div>';
    return;
  }
  el.innerHTML = list.map(c => {
    const isGroup  = c.type === 'group';
    const name     = isGroup ? (c.title || 'Group') : (c.peer?.display_name || c.participants);
    const initials = getInitials(name);
    const photo    = isGroup ? '' : (c.peer?.photo_url || '');
    const color    = isGroup ? '#8b5cf6' : (c.peer?.accent_color || '#6c63ff');
    const online   = !isGroup && isOnline(c.peer?.last_seen);
    const lastMsg  = c.last_message;
    const preview  = lastMsg
      ? (lastMsg.type === 'text' ? lastMsg.content : '📎 Attachment')
      : 'No messages yet';
    const ts       = lastMsg ? formatChatTime(lastMsg.timestamp) : '';

    return `
      <div class="chat-item${activeChatId === c.chat_id ? ' active' : ''}" onclick="openChat('${c.chat_id}')" data-name="${name.toLowerCase()}" data-participants="${c.participants.toLowerCase()}">
        <div class="chat-avatar" style="background:linear-gradient(135deg,${color},#8b5cf6)">
          ${photo ? `<img src="${photo}" alt=""/>` : initials}
          ${online ? '<div class="avatar-online"></div>' : ''}
        </div>
        <div class="chat-info">
          <div class="chat-name">${isGroup ? '👥 ' : ''}${escHtml(name)}</div>
          <div class="chat-preview">${escHtml(preview)}</div>
        </div>
        <div class="chat-meta">
          <span class="chat-time">${ts}</span>
          <span class="chat-badge">0</span>
        </div>
      </div>`;
  }).join('');
}

function filterChats(q) {
  const query = q.toLowerCase();
  document.querySelectorAll('.chat-item').forEach(el => {
    const match = el.dataset.name.includes(query) || el.dataset.participants.includes(query);
    el.style.display = match ? '' : 'none';
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── OPEN CHAT ─────────────────────────────────────────────────
async function openChat(chatId) {
  activeChatId = chatId;
  lastMsgTs    = null;
  replyState   = null;

  const chat = chats.find(c => c.chat_id === chatId);
  if (!chat) return;

  // Update UI — hide no-chat, show active-chat
  document.getElementById('no-chat').style.display     = 'none';
  document.getElementById('account-panel').style.display = 'none';
  const ac = document.getElementById('active-chat');
  ac.style.display = 'flex';

  // Mobile: open chat panel
  document.getElementById('chat-panel').classList.add('mobile-open');

  // Highlight in sidebar
  document.querySelectorAll('.chat-item').forEach(el => {
    el.classList.toggle('active', el.onclick.toString().includes(chatId));
  });

  // Set header
  const isGroup = chat.type === 'group';
  const name    = isGroup ? (chat.title || 'Group') : (chat.peer?.display_name || chat.participants);
  const photo   = isGroup ? '' : (chat.peer?.photo_url || '');
  const color   = isGroup ? '#8b5cf6' : (chat.peer?.accent_color || '#6c63ff');
  const online  = !isGroup && isOnline(chat.peer?.last_seen);

  const hdrAv = document.getElementById('hdr-avatar');
  hdrAv.style.background = `linear-gradient(135deg,${color},#8b5cf6)`;
  hdrAv.innerHTML = photo ? `<img src="${photo}" alt=""/>` : getInitials(name);

  document.getElementById('hdr-name').textContent   = (isGroup ? '👥 ' : '') + name;
  document.getElementById('hdr-status').textContent = isGroup
    ? chat.participants.split(',').length + ' members'
    : online ? '🟢 Online' : 'Last seen ' + formatTime(chat.peer?.last_seen);

  // Is group? mark on messages area
  const ma = document.getElementById('messages-area');
  ma.classList.toggle('group-chat', isGroup);

  // Load messages
  await fetchMessages();

  // Pinned message
  updatePinnedBanner(chat.pinned_msg_id);

  // Re-render chat list to highlight active
  renderChatList(chats);
}

function closeMobileChat() {
  document.getElementById('chat-panel').classList.remove('mobile-open');
  document.getElementById('active-chat').style.display = 'none';
  document.getElementById('no-chat').style.display = '';
}

// ── MESSAGES ──────────────────────────────────────────────────
async function fetchMessages() {
  if (!activeChatId) return;
  const params = {
    action:   'getMessages',
    username: currentUser.username,
    token:    currentUser.user_token,
    chat_id:  activeChatId
  };
  if (lastMsgTs) params.after = lastMsgTs;

  const res = await apiGet(params);
  if (!res.ok) return;

  if (!lastMsgTs) {
    // Full reload
    activeMessages = res.messages || [];
  } else {
    // Append new ones
    const incoming = res.messages || [];
    activeMessages = [...activeMessages, ...incoming];
  }
  if (activeMessages.length) lastMsgTs = activeMessages[activeMessages.length - 1].timestamp;

  renderMessages();

  // Update pinned
  if (res.pinned_msg_id) updatePinnedBanner(res.pinned_msg_id);
}

function renderMessages() {
  const area = document.getElementById('messages-area');
  if (!area) return;
  const wasAtBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 60;

  if (!activeMessages.length) {
    area.innerHTML = '<div id="empty-state"><div class="empty-icon">💬</div><p>No messages yet. Say hello!</p></div>';
    return;
  }

  let html = '';
  let prevDate = '';
  let prevSender = '';

  activeMessages.forEach((msg) => {
    const mine = msg.sender === currentUser.username;
    const date = formatDate(msg.timestamp);
    const showSep = date !== prevDate;
    prevDate = date;

    if (showSep) {
      html += `<div class="date-sep">${date}</div>`;
      prevSender = '';
    }

    const showAvatar = !mine && msg.sender !== prevSender;
    prevSender = msg.sender;

    // 1. Логика цитаты (Reply quote) - оставляем твою
    let replyHtml = '';
    if (msg.reply_to_id) {
      const orig = activeMessages.find(m => m.msg_id === msg.reply_to_id);
      if (orig) {
        const rText = orig.type === 'image' ? '🖼 Image' : (orig.type === 'file' ? '📎 File' : escHtml(orig.content).slice(0, 80));
        replyHtml = `<div class="reply-quote" onclick="scrollToMsg('${orig.msg_id}')">
          <div class="rq-name">${escHtml(orig.sender)}</div>
          <div>${rText}</div>
        </div>`;
      }
    }

    // 2. НОВАЯ ЛОГИКА КОНТЕНТА (Картинка / Файл / Текст)
    let contentHtml = '';
    if (msg.type === 'image') {
      contentHtml = `<div class="msg-content"><img src="${msg.content}" class="chat-img" onclick="window.open('${msg.content}')" style="cursor:pointer; max-width:100%; border-radius:8px;"></div>`;
    } else if (msg.type === 'file') {
      contentHtml = `<div class="msg-content file-msg"><a href="${msg.content}" target="_blank" class="download-link">📎 Download File</a></div>`;
    } else {
      contentHtml = `<div class="msg-text">${escHtml(msg.content)}</div>`;
    }

    // 3. Собираем сообщение (верстка как у тебя была)
    html += `
      <div class="message ${mine ? 'mine' : 'other'}" id="msg-${msg.msg_id}" 
           oncontextmenu="showMsgMenu(event, '${msg.msg_id}', '${escHtml(msg.sender)}', \`${msg.content.replace(/`/g, '\\`')}\`)">
        ${showAvatar ? `<div class="msg-avatar">${msg.sender[0].toUpperCase()}</div>` : ''}
        <div class="msg-bubble">
          ${replyHtml}
          ${contentHtml}
          <div class="msg-time">${new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
        </div>
      </div>
    `;
  });

  area.innerHTML = html;
  if (wasAtBottom) area.scrollTop = area.scrollHeight;
}

    // Content
    let contentHtml = '';
    if (msg.type === 'image') {
      contentHtml = `<img class="msg-image" src="${escHtml(msg.content)}" alt="image" onclick="openImgViewer('${escHtml(msg.content)}'); event.stopPropagation();"/>`;
    } else if (msg.type === 'video') {
      contentHtml = `<video style="max-width:100%;border-radius:14px;max-height:280px" controls src="${escHtml(msg.content)}"></video>`;
    } else if (msg.type === 'file') {
      const fname = msg.content.split('/').pop().split('?')[0] || 'File';
      contentHtml = `<div class="msg-file">
        <span class="msg-file-icon">📎</span>
        <div class="msg-file-info">
          <div class="file-name">${escHtml(fname)}</div>
          <a class="file-dl" href="${escHtml(msg.content)}" target="_blank" rel="noopener">Download</a>
        </div>
      </div>`;
    } else {
      contentHtml = `<div class="msg-text">${escHtml(msg.content).replace(/\n/g,'<br/>')}</div>`;
    }

    // Sender name for group
    const senderNameHtml = !mine ? `<div class="msg-sender-name">${escHtml(msg.sender)}</div>` : '';

    // Avatar
    const senderUser = chats.flatMap(c => []).find(()=>false); // simplified
    const avatarHtml = (!mine && showAvatar)
      ? `<div class="msg-sender-avatar">${getInitials(msg.sender)}</div>`
      : (!mine ? `<div style="width:28px;flex-shrink:0"></div>` : '');

    html += `
      <div class="msg-row${mine?' mine':''}" id="msg-${msg.msg_id}" onclick="setReply('${msg.msg_id}','${escHtml(msg.sender)}','${escHtml((msg.content||'').replace(/'/g,"\\'")).slice(0,60)}')">
        ${avatarHtml}
        <div class="msg-bubble">
          ${senderNameHtml}
          ${replyHtml}
          ${contentHtml}
          <div class="msg-footer">
            <span class="msg-time">${formatTime(msg.timestamp)}</span>
          </div>
        </div>
      </div>`;
  });

  area.innerHTML = html;

  if (wasAtBottom || !lastMsgTs) {
    setTimeout(() => area.scrollTop = area.scrollHeight, 50);
  }
}

function scrollToMsg(msgId) {
  const el = document.getElementById('msg-' + msgId);

    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.style.background = 'rgba(108,99,255,0.18)';

// ── SEND MESSAGE ──────────────────────────────────────────────
async function uploadFileToTelegram(file) {
    const formData = new FormData();
    formData.append('file', file);

    try {
        const response = await fetch(`${BRIDGE_URL}/upload`, {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        if (data.ok) {
            // Возвращаем готовую ссылку для скачивания
            return `${BRIDGE_URL}/download/${data.file_id}`;
        }
    } catch (e) {
        console.error("Ошибка моста:", e);
        return null;
    }
}
  
async function sendMessage(overrideContent, overrideType) {
  const input = document.getElementById('msg-input');
  // Нам понадобится input для файлов. Добавь его в HTML (см. пункт 3 ниже)
  const fileInput = document.getElementById('file-input'); 
  
  let content = overrideContent || input.value.trim();
  let type = overrideType || 'text';
  
  const file = fileInput ? fileInput.files[0] : null;

  // Если нет ни текста, ни файла — выходим
  if (!content && !file && !overrideContent) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  try {
    // ШАГ 1: Если есть файл, загружаем его на Hugging Face
    if (file && !overrideContent) {
      showToast('Загрузка файла...');
      
      const formData = new FormData();
      formData.append('file', file);

      const uploadRes = await fetch(`${BRIDGE_URL}/upload`, {
        method: 'POST',
        body: formData
      });

      const uploadData = await uploadRes.json();
      
      if (uploadData.ok) {
        // Меняем контент на ссылку для скачивания, а тип на 'image' или 'file'
        content = `${BRIDGE_URL}/download/${uploadData.file_id}`;
        type = file.type.startsWith('image/') ? 'image' : 'file';
      } else {
        throw new Error('Ошибка загрузки на мост');
      }
    }

    // ШАГ 2: Отправляем данные в твою основную базу (Replit)
    const res = await apiPost({
      action:      'sendMessage',
      username:    currentUser.username,
      user_token:  currentUser.user_token,
      chat_id:     activeChatId,
      content,
      type,
      reply_to_id: replyState?.msg_id || ''
    });

    if (!res.ok) { 
      showToast('Failed to send: ' + (res.error || '')); 
    } else {
      // Очистка после успешной отправки
      input.value = '';
      if (fileInput) fileInput.value = ''; // Сбрасываем выбранный файл
      autoResize(input);
      clearReply();
      await fetchMessages();
      await loadChats();
    }

  } catch (err) {
    showToast('Ошибка: ' + err.message);
  } finally {
    btn.disabled = false;
  }
}

function msgKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

// ── FILE UPLOAD ───────────────────────────────────────────────
async function handleFileSelect(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  if (!BRIDGE_ENABLED) {
    showToast('⚠️ File bridge not configured. Set BRIDGE_ENABLED=true in config.');
    return;
  }

  const up  = document.getElementById('upload-progress');
  const bar = document.getElementById('prog-fill');
  up.style.display = 'flex'; bar.style.width = '0%';

  try {
    // Fake progress (XHR doesn't support upload progress with fetch easily)
    let p = 0;
    const tick = setInterval(() => { p = Math.min(p + 10, 85); bar.style.width = p + '%'; }, 200);

    const form = new FormData();
    form.append('file', file);

    const r   = await fetch(`${BRIDGE_URL}/upload`, { method: 'POST', body: form });
    const res = await r.json();
    clearInterval(tick); bar.style.width = '100%';
    setTimeout(() => { up.style.display = 'none'; bar.style.width = '0%'; }, 600);

    if (!res.ok) throw new Error(res.detail || 'Upload failed');

    const proxyUrl = `${BRIDGE_URL}${res.url}`;
    let type = 'file';
    if (file.type.startsWith('image/')) type = 'image';
    else if (file.type.startsWith('video/')) type = 'video';

    await sendMessage(proxyUrl, type);
  } catch (e) {
    up.style.display = 'none';
    showToast('Upload error: ' + e.message);
  }
}

async function uploadAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  if (!BRIDGE_ENABLED) { showToast('⚠️ Bridge not configured'); return; }

  const form = new FormData();
  form.append('file', file);
  try {
    showToast('Uploading avatar…');
    const r   = await fetch(`${BRIDGE_URL}/upload`, { method: 'POST', body: form });
    const res = await r.json();
    if (!res.ok) throw new Error('Upload failed');
    const url = `${BRIDGE_URL}${res.url}`;
    currentUser.photo_url = url;
    renderAccountPanel();
    showToast('Avatar updated! Save changes to apply.');
  } catch (e) { showToast('Avatar upload failed'); }
}

// ── NEW CHAT / GROUP MODALS ───────────────────────────────────
function openNewChatModal() {
  document.getElementById('nc-results').innerHTML = '';
  document.getElementById('nc-search').value = '';
  openModal('new-chat-modal');
}

function openGroupModal() {
  groupSelected = [];
  document.getElementById('grp-results').innerHTML = '';
  document.getElementById('grp-search').value = '';
  document.getElementById('group-name-input').value = '';
  renderGroupChips();
  openModal('group-modal');
}

function openModal(id)  { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

let searchDebounce = null;
async function searchUsers(q, resultsId, multiSelect) {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(async () => {
    if (!q.trim()) { document.getElementById(resultsId).innerHTML = ''; return; }
    const res = await apiGet({
      action: 'searchUsers', username: currentUser.username,
      token: currentUser.user_token, q
    });
    if (!res.ok) return;
    const el = document.getElementById(resultsId);
    el.innerHTML = (res.results || []).map(u => {
      const sel = groupSelected.includes(u.username);
      return `<div class="user-result-item${sel?' selected':''}" onclick="selectUser('${u.username}','${escHtml(u.display_name)}','${escHtml(u.photo_url||'')}','${escHtml(u.accent_color||'#6c63ff')}','${resultsId}','${multiSelect}')">
        <div class="result-avatar" style="background:linear-gradient(135deg,${u.accent_color||'#6c63ff'},#8b5cf6)">
          ${u.photo_url ? `<img src="${u.photo_url}" alt=""/>` : getInitials(u.display_name)}
        </div>
        <div class="result-info">
          <div class="result-name">${escHtml(u.display_name)}</div>
          <div class="result-username">${escHtml(u.username)}</div>
        </div>
        ${sel ? '<span style="color:var(--accent)">✓</span>' : ''}
      </div>`;
    }).join('') || '<div style="color:var(--text-muted);font-size:13px;padding:12px;">No users found.</div>';
  }, 350);
}

async function selectUser(username, display_name, photo_url, accent_color, resultsId, multiSelect) {
  if (multiSelect === 'true') {
    // Toggle selection for group
    const idx = groupSelected.indexOf(username);
    if (idx >= 0) groupSelected.splice(idx, 1);
    else groupSelected.push(username);
    renderGroupChips();
    await searchUsers(document.getElementById('grp-search').value, resultsId, true);
  } else {
    // Direct private chat
    closeModal('new-chat-modal');
    const res = await apiPost({
      action: 'createChat', username: currentUser.username,
      user_token: currentUser.user_token, type: 'private',
      participants: [username]
    });
    if (!res.ok) { showToast('Failed to create chat'); return; }
    await loadChats();
    const chatId = res.chat_id || (res.chat && res.chat.chat_id);
    if (chatId) openChat(chatId);
  }
}

function renderGroupChips() {
  const el = document.getElementById('group-chips');
  el.innerHTML = groupSelected.map(u => `
    <div class="chip">
      <div class="chip-avatar">${getInitials(u.replace('@',''))}</div>
      <span>${escHtml(u)}</span>
      <span class="chip-remove" onclick="removeGroupMember('${u}')">✕</span>
    </div>`).join('');
}

function removeGroupMember(username) {
  groupSelected = groupSelected.filter(u => u !== username);
  renderGroupChips();
}

async function createGroup() {
  const title = document.getElementById('group-name-input').value.trim();
  if (!title) { showToast('Please enter a group name'); return; }
  if (groupSelected.length < 1) { showToast('Select at least one member'); return; }

  const res = await apiPost({
    action: 'createChat', username: currentUser.username,
    user_token: currentUser.user_token, type: 'group',
    participants: groupSelected, title
  });
  if (!res.ok) { showToast('Failed: ' + (res.error || '')); return; }
  closeModal('group-modal');
  groupSelected = [];
  await loadChats();
  if (res.chat_id) openChat(res.chat_id);
}

// ── POLLING ───────────────────────────────────────────────────
async function pollMessages() {
  if (!activeChatId) return;
  await fetchMessages();
}

async function ping() {
  if (!currentUser) return;
  await apiGet({ action: 'ping', username: currentUser.username, token: currentUser.user_token });
}

// ── SETTINGS ──────────────────────────────────────────────────
function toggleTheme() {
  isLightMode = !isLightMode;
  enableLightMode(true);
}

function enableLightMode(save) {
  document.body.classList.toggle('light-mode', isLightMode);
  const sw = document.getElementById('theme-sw');
  if (sw) sw.classList.toggle('on', isLightMode);
  const lbl = document.getElementById('theme-label');
  if (lbl) lbl.textContent = isLightMode ? 'Light Mode' : 'Dark Mode';
  if (save && currentUser) currentUser.bg_type = isLightMode ? 'light' : 'dark';
}

async function saveSettings() {
  const name = document.getElementById('set-name').value.trim();
  if (!name) { showToast('Display name cannot be empty'); return; }

  currentUser.display_name  = name;
  const res = await apiPost({
    action:       'updateUser',
    username:     currentUser.username,
    user_token:   currentUser.user_token,
    display_name: name,
    accent_color: currentUser.accent_color,
    bg_type:      currentUser.bg_type,
    photo_url:    currentUser.photo_url || ''
  });

  if (res.ok) {
    renderAccountPanel();
    showToast('✅ Settings saved');
  } else {
    showToast('Failed to save: ' + (res.error || ''));
  }
}

// ── IMAGE VIEWER ──────────────────────────────────────────────
function openImgViewer(src) {
  document.getElementById('img-viewer-img').src = src;
  document.getElementById('img-viewer').classList.add('show');
}
function closeImgViewer() {
  document.getElementById('img-viewer').classList.remove('show');
  document.getElementById('img-viewer-img').src = '';
}

// ── KEYBOARD SHORTCUTS ────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeImgViewer();
    ['new-chat-modal','group-modal'].forEach(id => {
      if (!document.getElementById(id).classList.contains('hidden')) closeModal(id);
    });
    if (replyState) clearReply();
  }
});

// ── CLOSE MODALS ON OVERLAY CLICK ────────────────────────────
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); });
});

// ── STARTUP ───────────────────────────────────────────────────
(async function boot() {
  const ok = await tryAutoLogin();
  if (ok) {
    initApp();
  }
  // Auth screen is shown by default
})();

</script>
